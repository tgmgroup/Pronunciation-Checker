<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, viewport-fit=cover"
		/>
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta
			name="apple-mobile-web-app-status-bar-style"
			content="black-translucent"
		/>
		<link rel="manifest" href="manifest.json" />
		<title>Isesaki.in's AI Pronunciation Coach</title>
		<link rel="stylesheet" href="assets/styles.css" />
		<link rel="manifest" href="/manifest.json" />

		<script>
			(function () {
				const t = localStorage.getItem("theme");
				if (
					t === "dark" ||
					(!t && window.matchMedia("(prefers-color-scheme: dark)").matches)
				)
					document.documentElement.classList.add("dark-mode");
			})();
		</script>
	</head>
	<body>
		<div class="app-shell">
			<main class="content-container">
				<header class="header-flex">
					<div class="brand">
						<img src="images/logo.png" alt="Logo" class="app-logo" />
						<h1 id="ui-title">Pronunciation Coach</h1>
					</div>
					<div class="top-controls">
						<select id="languageSelect">
							<option value="en">English 🇺🇸</option>
							<option value="ja">日本語 🇯🇵</option>
							<option value="es">Español 🇪🇸</option>
						</select>
						<button id="theme-toggle" class="icon-btn">Light ☀️</button>
					</div>
				</header>

				<section class="input-section">
					<div
						id="textToPractice"
						contenteditable="true"
						placeholder="Type or paste text here to practice..."
						style="
							min-height: 150px;
							border: 1px solid #ccc;
							padding: 10px;
							overflow-y: auto;
						"
					></div>
				</section>

				<div class="action-bar">
					<button id="sampleTextButton" class="btn-secondary">
						Load Sample</button
					><button id="speakButton" class="btn-secondary">
						Listen to Text
					</button>
					<button id="recordButton" class="btn-primary">
						Check Pronunciation
					</button>
					<button id="stopButton" class="btn-danger" disabled>
						Stop Checking
					</button>
					<button
						id="aiCheckButton"
						style="display: none; background-color: #673ab7; color: white"
					>
						Deep AI Analysis ✨
					</button>
					<button id="replayButton" style="display: none">Replay 🔄</button>
				</div>
				<div class="controls-row">
					<div class="voice-controls">
						<label for="genderSelect"></label>
						<select id="genderSelect">
							<option value="female">Female Coach 👩</option>
							<option value="male">Male Coach 👨</option>
						</select>
					</div>
					<button id="replayButton" style="display: none">Replay 🔄</button>
					<div class="speed-box">
						<label id="ui-label-speed">Reading Speed: </label>
						<input
							type="range"
							id="rateSlider"
							min="0.5"
							max="2"
							step="0.1"
							value="1"
						/>
						<span id="rateValue">1.0</span>
					</div>
				</div>
				<canvas id="waveformCanvas"></canvas>

				<div id="loadingScanner" style="display: none">
					<div class="scanner-line"></div>
					<p>AI Coach is listening to your recording...</p>
				</div>

				<div id="resultsArea" style="display: none">
					<div id="status" class="status-badge">Ready</div>
					<div class="accuracy-circle"><span id="accuracyValue">0</span>%</div>
					<div id="visualFeedback" class="word-display"></div>
					<div id="translationCoach" class="coach-box" style="display: none">
						<p id="coachAdvice"></p>
					</div>
				</div>
			</main>

			<aside class="sidebar">
				<div class="sidebar-header">
					<h3 id="ui-label-history">History</h3>
					<button id="clearHistoryBtn" class="btn-clear">Clear</button>
				</div>
				<div id="textHistoryList" class="history-list"></div>

				<img
					id="floating-image"
					src="images/mohamed-hassan-Oh3p6Wu3OOE-unsplash.png"
					alt="Woman wearing headphones speaking into a microphone"
					onclick="this.style.display = 'none'"
				/>
			</aside>
		</div>
		<div
			id="globalPopover"
			style="
				position: absolute;
				display: none;
				background: #333;
				color: #fff;
				padding: 5px 10px;
				border-radius: 4px;
				font-size: 14px;
				z-index: 1000;
				pointer-events: none;
			"
		></div>
		<script src="assets/scripts.js"></script>
	</body>
</html>
